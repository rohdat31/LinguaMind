// ═══════════════════════════════════════════════════════════════
// QUIZ TAB
// ═══════════════════════════════════════════════════════════════
function QuizTab({vocab,updateSR}){
  const [mode,setMode]=useState(null);
  const [qIdx,setQIdx]=useState(0);
  const [score,setScore]=useState(0);
  const [sel,setSel]=useState(null);
  const [shown,setShown]=useState(false);
  const [done,setDone]=useState(false);
  const [timer,setTimer]=useState(15);
  const [tActive,setTActive]=useState(false);
  const [fill,setFill]=useState("");
  const [opts,setOpts]=useState([]);
  const [mp,setMp]=useState(null);
  const [mSel,setMSel]=useState(null);
  const [mDone,setMDone]=useState([]);
  const [mErr,setMErr]=useState([]);
  const tRef=useRef(null);
  const wRef=useRef([]);const iRef=useRef(0);const sRef=useRef(0);const shRef=useRef(false);
  const sh=a=>[...a].sort(()=>Math.random()-.5);
  const mkOpts=(w,all)=>sh([w.translation,...sh(all.filter(x=>x.id!==w.id)).slice(0,3).map(x=>x.translation||x.word)]);

  const start=(m)=>{
    if(vocab.length<4){alert("Necesitas al menos 4 palabras.");return;}
    clearInterval(tRef.current);
    const pool=sh(vocab).slice(0,Math.min(10,vocab.length));
    wRef.current=pool;iRef.current=0;sRef.current=0;shRef.current=false;
    setMode(m);setQIdx(0);setScore(0);setSel(null);setShown(false);setDone(false);setFill("");
    if(m==="match"){
      const pairs=sh(vocab).slice(0,Math.min(8,vocab.length));
      setMp({L:sh(pairs.map((w,i)=>({id:i,text:w.word,pid:i,side:"w"}))),R:sh(pairs.map((w,i)=>({id:i+100,text:w.translation||w.word,pid:i,side:"t"})))});
      setMSel(null);setMDone([]);setMErr([]);
    }else{if(m==="mc")setOpts(mkOpts(pool[0],vocab));setTimer(15);setTActive(true);}
  };

  useEffect(()=>{
    if(!tActive)return;
    clearInterval(tRef.current);
    tRef.current=setInterval(()=>setTimer(t=>{
      if(t<=1){clearInterval(tRef.current);if(!shRef.current){shRef.current=true;setSel("__to__");setShown(true);setTActive(false);}return 15;}
      return t-1;
    }),1000);
    return()=>clearInterval(tRef.current);
  },[tActive]);

  const answer=(ans)=>{
    if(shRef.current)return;
    clearInterval(tRef.current);setTActive(false);shRef.current=true;
    const w=wRef.current[iRef.current];
    const ok=ans&&ans.toLowerCase().trim()===w?.translation?.toLowerCase().trim();
    if(ok){sRef.current++;setScore(sRef.current);}
    setSel(ans||"__to__");setShown(true);
    if(ok)speak(w?.word);
    if(w)updateSR(w.id,ok?"easy":"hard");
  };

  const nxt=()=>{
    const nx=iRef.current+1;
    if(nx>=wRef.current.length){setDone(true);setTActive(false);updateStreak();return;}
    iRef.current=nx;shRef.current=false;
    setQIdx(nx);setSel(null);setShown(false);setFill("");
    if(mode==="mc")setOpts(mkOpts(wRef.current[nx],vocab));
    setTimer(15);setTActive(true);
  };

  const mClick=(item)=>{
    if(mDone.includes(item.pid))return;
    if(!mSel){setMSel(item);return;}
    if(mSel.id===item.id){setMSel(null);return;}
    if(mSel.pid===item.pid&&mSel.side!==item.side){
      setMDone(d=>[...d,item.pid]);
      speak(mp.L.find(x=>x.pid===item.pid)?.text||"");
      const w=vocab.find(x=>x.word===mp.L.find(y=>y.pid===item.pid)?.text);
      if(w)updateSR(w.id,"ok");
      setMSel(null);
    }else{
      setMErr(e=>[...e,mSel.id,item.id]);
      setTimeout(()=>setMErr(e=>e.filter(x=>x!==mSel.id&&x!==item.id)),700);
      setMSel(null);
    }
  };

  const tPct=(timer/15)*100;
  const tC=timer>8?"#34d399":timer>4?"#fbbf24":"#f87171";

  if(!mode)return html`
    <div style=${{display:"flex",flexDirection:"column",gap:"16px"}}>
      <div class="card" style=${{padding:"24px",background:"linear-gradient(135deg,rgba(109,40,217,.3),rgba(79,70,229,.25))",border:"1px solid rgba(99,102,241,.2)"}}>
        <div style=${{fontSize:"32px",marginBottom:"8px"}}>🧠</div>
        <div class="syne" style=${{fontSize:"20px",color:"#fff"}}>Quiz Time</div>
        <div style=${{fontSize:"13px",color:"rgba(255,255,255,.55)",marginTop:"5px"}}>${vocab.length} palabras · El resultado actualiza tu progreso</div>
      </div>
      <div style=${{display:"grid",gap:"12px",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))"}}>
        ${[
          {id:"mc",icon:"🎯",title:"Multiple Choice",desc:"4 opciones · 15 seg · temporizador",grad:"rgba(79,70,229,.12)",border:"rgba(79,70,229,.25)",btn:"linear-gradient(135deg,#4f46e5,#6366f1)"},
          {id:"fill",icon:"✏️",title:"Fill in the Blank",desc:"Escribe la traducción · Active Recall",grad:"rgba(109,40,217,.12)",border:"rgba(109,40,217,.25)",btn:"linear-gradient(135deg,#7c3aed,#8b5cf6)"},
          {id:"match",icon:"🔗",title:"Match Pairs",desc:"Conecta palabras con traducciones",grad:"rgba(5,150,105,.1)",border:"rgba(16,185,129,.2)",btn:"linear-gradient(135deg,#059669,#0d9488)"},
        ].map(m=>html`
          <div key=${m.id} class="card" style=${{padding:"20px",background:m.grad,border:`1px solid ${m.border}`,display:"flex",flexDirection:"column",gap:"13px"}}>
            <span style=${{fontSize:"28px"}}>${m.icon}</span>
            <div><div class="syne" style=${{fontSize:"15px",color:"#fff"}}>${m.title}</div><div style=${{fontSize:"12px",color:"rgba(255,255,255,.5)",marginTop:"4px"}}>${m.desc}</div></div>
            <button style=${{padding:"10px",borderRadius:"12px",background:m.btn,border:"none",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer"}} onClick=${()=>start(m.id)}>Comenzar →</button>
          </div>
        `)}
      </div>
    </div>
  `;

  if(mode==="match"){
    const mf=mp?.L&&mDone.length===mp.L.length;
    return html`
      <div style=${{display:"flex",flexDirection:"column",gap:"13px"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div class="syne" style=${{fontSize:"18px",color:"#fff"}}>🔗 Match Pairs</div><div style=${{fontSize:"12px",color:"rgba(255,255,255,.4)",marginTop:"2px"}}>${mDone.length}/${mp?.L?.length||0} emparejadas</div></div>
          <button class="btn btn-ghost" onClick=${()=>setMode(null)}>← Menú</button>
        </div>
        ${mf?html`
          <div class="card" style=${{padding:"40px",textAlign:"center",background:"linear-gradient(135deg,rgba(5,150,105,.3),rgba(13,148,136,.2))",border:"1px solid rgba(16,185,129,.25)"}}>
            <div style=${{fontSize:"48px",marginBottom:"10px"}}>🎉</div>
            <div class="syne" style=${{fontSize:"20px",color:"#6ee7b7"}}>¡Perfecto!</div>
            <button class="btn" style=${{marginTop:"16px",background:"linear-gradient(135deg,#059669,#0d9488)"}} onClick=${()=>start("match")}>Jugar de nuevo</button>
          </div>
        `:html`
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
            ${["L","R"].map(side=>html`
              <div key=${side} style=${{display:"flex",flexDirection:"column",gap:"5px"}}>
                <div style=${{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1.5px",color:"rgba(255,255,255,.25)",paddingLeft:"2px"}}>${side==="L"?"Palabras":"Traducciones"}</div>
                ${mp?.[side]?.map(item=>{
                  const iD=mDone.includes(item.pid),iS=mSel?.id===item.id,iE=mErr.includes(item.id);
                  return html`<button key=${item.id} onClick=${()=>mClick(item)} disabled=${iD}
                    style=${{padding:"11px 13px",borderRadius:"12px",border:"1px solid",fontSize:"13px",fontWeight:600,textAlign:"left",cursor:iD?"default":"pointer",transition:"all .15s",
                      background:iD?"rgba(16,185,129,.15)":iS?(side==="L"?"rgba(79,70,229,.35)":"rgba(109,40,217,.35)"):iE?"rgba(239,68,68,.2)":"rgba(255,255,255,.04)",
                      borderColor:iD?"rgba(52,211,153,.4)":iS?"rgba(165,180,252,.6)":iE?"rgba(248,113,113,.5)":"rgba(255,255,255,.08)",
                      color:iD?"#6ee7b7":iE?"#fca5a5":"#fff",transform:iS?"scale(1.02)":"scale(1)"}}>
                    ${iD?"✓ ":""}${item.text}
                  </button>`;
                })}
              </div>
            `)}
          </div>
        `}
      </div>
    `;
  }

  if(done){
    const pct=Math.round((sRef.current/wRef.current.length)*100);
    return html`
      <div class="card" style=${{padding:"40px",textAlign:"center",maxWidth:"360px",margin:"0 auto",background:"linear-gradient(135deg,rgba(109,40,217,.3),rgba(79,70,229,.25))",border:"1px solid rgba(99,102,241,.2)"}}>
        <div style=${{fontSize:"46px",marginBottom:"10px"}}>${pct>=80?"🏆":pct>=60?"👍":"💪"}</div>
        <div class="syne" style=${{fontSize:"32px",color:"#fff"}}>${sRef.current}/${wRef.current.length}</div>
        <div style=${{fontSize:"16px",color:"rgba(255,255,255,.5)",marginTop:"3px"}}>${pct}% correcto</div>
        <div class="sbar" style=${{margin:"13px 0"}}><div class="sbar-fill" style=${{width:`${pct}%`,background:"linear-gradient(90deg,#6366f1,#8b5cf6)"}}></div></div>
        <div style=${{fontSize:"13px",color:"rgba(255,255,255,.45)"}}>${pct>=80?"¡Excelente!":pct>=60?"¡Bien! Revisa lo que fallaste.":"¡Sigue practicando!"}</div>
        <div style=${{display:"flex",gap:"8px",marginTop:"16px"}}>
          <button class="btn btn-primary" style=${{flex:1}} onClick=${()=>start(mode)}>Reintentar</button>
          <button class="btn btn-ghost" style=${{flex:1}} onClick=${()=>setMode(null)}>← Menú</button>
        </div>
      </div>
    `;
  }

  const word=wRef.current[qIdx];if(!word)return null;
  const cat=CATS[word.type]||CATS.noun;
  return html`
    <div style=${{maxWidth:"480px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"13px"}}>
      <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div><div style=${{fontSize:"12px",color:"rgba(255,255,255,.4)"}}>Pregunta ${qIdx+1}/${wRef.current.length}</div><div class="syne" style=${{fontSize:"17px",color:"#fff",marginTop:"2px"}}>Score: ${score}</div></div>
        <div style=${{display:"flex",alignItems:"center",gap:"10px"}}>
          <div style=${{position:"relative",width:"42px",height:"42px"}}>
            <svg width="42" height="42" style=${{transform:"rotate(-90deg)"}}>
              <circle cx="21" cy="21" r="16" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="4"/>
              <circle cx="21" cy="21" r="16" fill="none" stroke-width="4" stroke-linecap="round" stroke=${tC} stroke-dasharray=${`${2*Math.PI*16}`} stroke-dashoffset=${`${2*Math.PI*16*(1-tPct/100)}`} style=${{transition:"stroke-dashoffset 1s linear"}}/>
            </svg>
            <span style=${{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:900,color:"#fff"}}>${timer}</span>
          </div>
          <button class="btn btn-ghost" style=${{padding:"6px 10px"}} onClick=${()=>setMode(null)}>✕</button>
        </div>
      </div>
      <div class="sbar"><div class="sbar-fill" style=${{width:`${((qIdx+1)/wRef.current.length)*100}%`,background:`linear-gradient(90deg,${cat.color},#8b5cf6)`}}></div></div>
      <div class="card" style=${{padding:"24px",textAlign:"center",background:`linear-gradient(135deg,${cat.bg},rgba(15,20,40,.8))`,border:`1px solid ${cat.border}`}}>
        <div style=${{fontSize:"10px",textTransform:"uppercase",letterSpacing:"2px",color:cat.color,opacity:.8,marginBottom:"7px"}}>${cat.icon} ${cat.label}</div>
        <div class="syne" style=${{fontSize:"30px",color:"#fff",marginBottom:"4px"}}>${word.word}</div>
        <div style=${{fontSize:"12px",color:"rgba(255,255,255,.35)",fontFamily:"monospace",marginBottom:"6px"}}>${word.phonetic}</div>
        ${word.type==="irregular_verb"&&word.past&&html`<div style=${{fontSize:"11px",color:"rgba(248,113,113,.6)",marginBottom:"6px"}}>${word.word} → ${word.past} → ${word.past_participle}</div>`}
        <button onClick=${()=>speak(word.word)} style=${{width:"34px",height:"34px",borderRadius:"10px",background:cat.bg,border:`1px solid ${cat.border}`,cursor:"pointer",fontSize:"14px",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>🔊</button>
      </div>

      ${mode==="mc"&&html`
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",minHeight:"140px"}}>
          ${opts.map((opt,i)=>{
            const isC=opt===word.translation,isS=sel===opt,isT=sel==="__to__";
            let bg="rgba(255,255,255,.04)",bc="rgba(255,255,255,.08)",c="#fff";
            if(shown){if(isC){bg="rgba(16,185,129,.2)";bc="rgba(52,211,153,.5)";c="#6ee7b7";}else if(isS&&!isC){bg="rgba(239,68,68,.2)";bc="rgba(248,113,113,.5)";c="#fca5a5";}else{bg="rgba(255,255,255,.02)";bc="rgba(255,255,255,.04)";c="rgba(255,255,255,.25)";}}
            return html`<button key=${i} onClick=${()=>{if(!shown)answer(opt);}}
              style=${{padding:"12px 13px",borderRadius:"12px",border:`1px solid ${bc}`,background:bg,color:c,fontSize:"13px",fontWeight:600,textAlign:"left",cursor:shown?"default":"pointer",transition:"all .15s"}}>
              <span style=${{color:"rgba(255,255,255,.25)",marginRight:"6px"}}>${["A","B","C","D"][i]}.</span>${opt}
              ${shown&&isC&&" ✓"}${shown&&isT&&isC&&html`<span style=${{fontSize:"10px",color:"#6ee7b7"}}> ← correcta</span>`}
            </button>`;
          })}
        </div>
      `}

      ${mode==="fill"&&html`
        <div style=${{display:"flex",flexDirection:"column",gap:"8px"}}>
          <input class="inp" value=${fill} onInput=${e=>setFill(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter"&&!shown)answer(fill);}} disabled=${shown}
            placeholder="Escribe la traducción en español…"
            style=${{fontSize:"14px",fontWeight:600,
              background:shown?(fill.toLowerCase().trim()===word.translation?.toLowerCase().trim()?"rgba(16,185,129,.15)":"rgba(239,68,68,.15)"):"rgba(255,255,255,.06)",
              borderColor:shown?(fill.toLowerCase().trim()===word.translation?.toLowerCase().trim()?"rgba(52,211,153,.5)":"rgba(248,113,113,.5)"):"rgba(255,255,255,.11)",
              color:shown?(fill.toLowerCase().trim()===word.translation?.toLowerCase().trim()?"#6ee7b7":"#fca5a5"):"#fff"}}/>
          ${!shown&&html`<button class="btn btn-primary" style=${{justifyContent:"center"}} onClick=${()=>answer(fill)}>Verificar ✓</button>`}
          ${shown&&html`
            <div style=${{borderRadius:"12px",padding:"10px 13px",fontSize:"13px",
              background:fill.toLowerCase().trim()===word.translation?.toLowerCase().trim()?"rgba(16,185,129,.12)":"rgba(239,68,68,.12)",
              border:`1px solid ${fill.toLowerCase().trim()===word.translation?.toLowerCase().trim()?"rgba(52,211,153,.3)":"rgba(248,113,113,.3)"}`,
              color:fill.toLowerCase().trim()===word.translation?.toLowerCase().trim()?"#6ee7b7":"#fca5a5"}}>
              ${fill.toLowerCase().trim()===word.translation?.toLowerCase().trim()?"✅ ¡Correcto!":"❌ Respuesta: "}<strong>${word.translation}</strong>
            </div>
          `}
        </div>
      `}

      ${shown&&html`
        <div style=${{display:"flex",flexDirection:"column",gap:"7px"}}>
          ${word.examples?.[0]&&html`<div style=${{fontSize:"12px",color:"rgba(255,255,255,.35)",textAlign:"center",fontStyle:"italic"}}>"${word.examples[0]}"</div>`}
          <button class="btn btn-primary" style=${{justifyContent:"center"}} onClick=${nxt}>
            ${qIdx+1>=wRef.current.length?"Ver resultados 🏆":"Siguiente →"}
          </button>
        </div>
      `}
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// BRAIN TAB
// ═══════════════════════════════════════════════════════════════
function BrainTab({vocab,sr,updateSR}){
  const [session,setSession]=useState(null);
  const [rIdx,setRIdx]=useState(0);
  const [revealed,setRevealed]=useState(false);
  const [sessionDone,setSessionDone]=useState(false);
  const [ratedCount,setRatedCount]=useState(0);
  const streak=loadStreak().streak;
  const due=useMemo(()=>getDueWords(vocab,sr),[vocab,sr]);
  const mastered=useMemo(()=>vocab.filter(w=>getSREntry(sr,w.id).strength>=4).length,[vocab,sr]);
  const totalReviews=useMemo(()=>Object.values(sr).reduce((a,e)=>a+(e.reviews||0),0),[sr]);
  const catBreakdown=useMemo(()=>{const bd={};vocab.forEach(w=>{bd[w.type]=(bd[w.type]||0)+1;});return Object.entries(bd).sort((a,b)=>b[1]-a[1]);},[vocab]);
  const memWords=useMemo(()=>[...vocab].sort((a,b)=>getSREntry(sr,b.id).strength-getSREntry(sr,a.id).strength),[vocab,sr]);
  const LVL_C={A1:"#34d399",A2:"#10b981",B1:"#60a5fa",B2:"#818cf8",C1:"#f59e0b",C2:"#ef4444"};

  const startSession=()=>{setSession("reviewing");setRIdx(0);setRevealed(false);setSessionDone(false);setRatedCount(0);};

  const rate=(rating)=>{
    const w=due[rIdx];if(w){updateSR(w.id,rating);updateStreak();}
    setRatedCount(r=>r+1);
    const next=rIdx+1;
    if(next>=due.length)setSessionDone(true);
    else{setRIdx(next);setRevealed(false);}
  };

  if(session==="reviewing"&&!sessionDone){
    const w=due[rIdx];if(!w){setSessionDone(true);return null;}
    const cat=CATS[w.type]||CATS.noun;
    const srE=getSREntry(sr,w.id);
    return html`
      <div style=${{maxWidth:"460px",margin:"0 auto",display:"flex",flexDirection:"column",gap:"14px"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div class="syne" style=${{fontSize:"18px",color:"#fff"}}>Sesión de Repaso</div><div style=${{fontSize:"12px",color:"rgba(255,255,255,.4)",marginTop:"2px"}}>${rIdx+1}/${due.length} · Completadas: ${ratedCount}</div></div>
          <button class="btn btn-ghost" style=${{padding:"6px 12px"}} onClick=${()=>setSession(null)}>Salir</button>
        </div>
        <div class="sbar"><div class="sbar-fill" style=${{width:`${(rIdx/due.length)*100}%`,background:`linear-gradient(90deg,${cat.color},#8b5cf6)`}}></div></div>
        <div class="card" style=${{padding:"28px",textAlign:"center",background:`linear-gradient(135deg,${cat.bg},rgba(15,20,35,.9))`,border:`1px solid ${cat.border}`}}>
          <div style=${{fontSize:"10px",color:cat.color,textTransform:"uppercase",letterSpacing:"2px",marginBottom:"7px"}}>${cat.icon} ${cat.label}</div>
          <div class="syne" style=${{fontSize:"32px",color:"#fff",marginBottom:"4px"}}>${w.word}</div>
          <div style=${{fontSize:"12px",color:"rgba(255,255,255,.35)",fontFamily:"monospace",marginBottom:"7px"}}>${w.phonetic}</div>
          ${w.type==="irregular_verb"&&w.past&&html`<div style=${{fontSize:"11px",color:"rgba(248,113,113,.6)",marginBottom:"6px"}}>${w.word} · ${w.past} · ${w.past_participle}</div>`}
          <div style=${{fontSize:"11px",color:"rgba(255,255,255,.3)",marginBottom:"10px"}}>Fuerza: ${"⭐".repeat(srE.strength)||"—"}</div>
          <button onClick=${()=>speak(w.word)} style=${{width:"36px",height:"36px",borderRadius:"10px",background:cat.bg,border:`1px solid ${cat.border}`,cursor:"pointer",fontSize:"15px",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center"}}>🔊</button>
          ${!revealed&&html`<button class="btn btn-ghost" style=${{marginTop:"12px",justifyContent:"center",width:"100%"}} onClick=${()=>setRevealed(true)}>Ver respuesta 👁</button>`}
          ${revealed&&html`
            <div class="fadeUp" style=${{marginTop:"12px",padding:"13px",borderRadius:"13px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)"}}>
              <div class="syne" style=${{fontSize:"20px",color:cat.color}}>${w.translation}</div>
              <div style=${{fontSize:"12px",color:"rgba(255,255,255,.55)",marginTop:"4px",lineHeight:1.6}}>${w.definition}</div>
              ${w.examples?.[0]&&html`<div style=${{fontSize:"11px",color:"rgba(255,255,255,.35)",marginTop:"4px",fontStyle:"italic"}}>"${w.examples[0]}"</div>`}
              ${w.type==="connector"&&w.usage&&html`<div style=${{fontSize:"11px",color:"rgba(168,85,247,.7)",marginTop:"3px"}}>Uso: ${w.usage}</div>`}
            </div>
          `}
        </div>
        ${revealed&&html`
          <div class="fadeUp" style=${{display:"flex",gap:"8px"}}>
            <button style=${{flex:1,padding:"11px",borderRadius:"13px",background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",color:"#f87171",fontSize:"13px",fontWeight:700,cursor:"pointer"}} onClick=${()=>rate("hard")}>😤 Difícil</button>
            <button style=${{flex:1,padding:"11px",borderRadius:"13px",background:"rgba(99,102,241,.15)",border:"1px solid rgba(99,102,241,.3)",color:"#a5b4fc",fontSize:"13px",fontWeight:700,cursor:"pointer"}} onClick=${()=>rate("ok")}>👍 Bien</button>
            <button style=${{flex:1,padding:"11px",borderRadius:"13px",background:"rgba(16,185,129,.15)",border:"1px solid rgba(16,185,129,.3)",color:"#6ee7b7",fontSize:"13px",fontWeight:700,cursor:"pointer"}} onClick=${()=>rate("easy")}>🎯 Fácil</button>
          </div>
          <div style=${{fontSize:"11px",color:"rgba(255,255,255,.2)",textAlign:"center"}}>😤 reinicia intervalo · 👍 mantiene · 🎯 avanza nivel</div>
        `}
      </div>
    `;
  }

  if(sessionDone)return html`
    <div class="card" style=${{padding:"40px",textAlign:"center",maxWidth:"360px",margin:"0 auto",background:"linear-gradient(135deg,rgba(16,185,129,.25),rgba(5,150,105,.2))",border:"1px solid rgba(16,185,129,.25)"}}>
      <div style=${{fontSize:"48px",marginBottom:"10px"}}>🎉</div>
      <div class="syne" style=${{fontSize:"20px",color:"#6ee7b7"}}>¡Sesión completada!</div>
      <div style=${{fontSize:"13px",color:"rgba(255,255,255,.55)",marginTop:"5px"}}>Repasaste ${ratedCount} palabras · Progreso guardado</div>
      <div style=${{fontSize:"22px",marginTop:"12px"}}>🔥 Racha: ${loadStreak().streak} días</div>
      <button class="btn btn-green" style=${{marginTop:"16px",justifyContent:"center",width:"100%"}} onClick=${()=>setSession(null)}>Ver mi progreso</button>
    </div>
  `;

  return html`
    <div style=${{display:"flex",flexDirection:"column",gap:"16px"}}>
      <!-- Stats -->
      <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:"10px"}}>
        ${[
          {icon:"🔥",val:streak,label:"Racha",color:"#f97316",bg:"rgba(249,115,22,.12)",border:"rgba(249,115,22,.25)"},
          {icon:"📖",val:vocab.length,label:"Total",color:"#6366f1",bg:"rgba(99,102,241,.12)",border:"rgba(99,102,241,.25)"},
          {icon:"⭐",val:mastered,label:"Dominadas",color:"#f59e0b",bg:"rgba(245,158,11,.12)",border:"rgba(245,158,11,.25)"},
          {icon:"🔔",val:due.length,label:"Revisar",color:"#ef4444",bg:"rgba(239,68,68,.12)",border:"rgba(239,68,68,.25)"},
          {icon:"📊",val:totalReviews,label:"Repasos",color:"#10b981",bg:"rgba(16,185,129,.12)",border:"rgba(16,185,129,.25)"},
        ].map(s=>html`
          <div key=${s.label} style=${{borderRadius:"15px",padding:"13px",background:s.bg,border:`1px solid ${s.border}`,textAlign:"center"}}>
            <div style=${{fontSize:"20px"}}>${s.icon}</div>
            <div class="syne" style=${{fontSize:"20px",color:s.color,marginTop:"3px"}}>${s.val}</div>
            <div style=${{fontSize:"10px",color:"rgba(255,255,255,.4)",marginTop:"1px"}}>${s.label}</div>
          </div>
        `)}
      </div>

      <!-- Review session card -->
      <div class="card" style=${{padding:"20px",background:due.length>0?"linear-gradient(135deg,rgba(239,68,68,.15),rgba(245,158,11,.1))":"linear-gradient(135deg,rgba(16,185,129,.12),rgba(5,150,105,.08))",border:`1px solid ${due.length>0?"rgba(239,68,68,.3)":"rgba(16,185,129,.25)"}`}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"10px"}}>
          <div>
            <div class="syne" style=${{fontSize:"15px",color:due.length>0?"#fca5a5":"#6ee7b7"}}>
              ${due.length>0?`🔔 ${due.length} palabras para repasar`:"✅ ¡Al día! No hay palabras pendientes"}
            </div>
            <div style=${{fontSize:"12px",color:"rgba(255,255,255,.45)",marginTop:"2px"}}>
              ${due.length>0?"El repaso espaciado fortalece la memoria a largo plazo":"Vuelve mañana o agrega nuevas palabras"}
            </div>
          </div>
          ${due.length>0&&html`
            <button style=${{padding:"10px 20px",borderRadius:"13px",background:"linear-gradient(135deg,#ef4444,#f97316)",border:"none",color:"#fff",fontSize:"13px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}} onClick=${startSession}>
              Iniciar sesión →
            </button>
          `}
        </div>
        ${due.length>0&&html`
          <div style=${{marginTop:"10px",display:"flex",flexWrap:"wrap",gap:"5px"}}>
            ${due.slice(0,8).map(w=>{const c=CATS[w.type]||CATS.noun;return html`
              <span key=${w.id} style=${{fontSize:"11px",padding:"2px 8px",borderRadius:"20px",background:c.bg,color:c.color,border:`1px solid ${c.border}`,fontWeight:600}}>${c.icon} ${w.word}</span>
            `;})}
            ${due.length>8&&html`<span style=${{fontSize:"11px",padding:"2px 8px",borderRadius:"20px",background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.4)"}}>+${due.length-8} más</span>`}
          </div>
        `}
      </div>

      <!-- Category breakdown -->
      <div class="card" style=${{padding:"18px"}}>
        <div class="syne" style=${{fontSize:"14px",color:"#fff",marginBottom:"13px"}}>📊 Tu vocabulario por categoría</div>
        <div style=${{display:"flex",flexDirection:"column",gap:"7px"}}>
          ${catBreakdown.map(([type,count])=>{
            const c=CATS[type]||CATS.noun;
            const pct=Math.round((count/vocab.length)*100);
            return html`
              <div key=${type} style=${{display:"flex",alignItems:"center",gap:"9px"}}>
                <div style=${{width:"120px",fontSize:"12px",color:c.color,fontWeight:600,flexShrink:0}}>${c.icon} ${c.label}</div>
                <div style=${{flex:1,height:"5px",borderRadius:"5px",background:"rgba(255,255,255,.07)",overflow:"hidden"}}>
                  <div style=${{height:"100%",borderRadius:"5px",background:c.color,width:`${pct}%`,opacity:.8}}></div>
                </div>
                <div style=${{width:"28px",fontSize:"11px",color:"rgba(255,255,255,.4)",textAlign:"right",flexShrink:0}}>${count}</div>
              </div>
            `;
          })}
          ${catBreakdown.length===0&&html`<div style=${{fontSize:"13px",color:"rgba(255,255,255,.3)",textAlign:"center",padding:"8px"}}>Agrega palabras para ver el desglose</div>`}
        </div>
      </div>

      <!-- Memory map -->
      <div class="card" style=${{padding:"18px"}}>
        <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"11px"}}>
          <div class="syne" style=${{fontSize:"14px",color:"#fff"}}>🗺️ Mapa de Memoria</div>
          <div style=${{display:"flex",gap:"7px",fontSize:"10px",color:"rgba(255,255,255,.3)"}}>
            ${[[0,"#4b5563","Nueva"],[2,"#f97316","En proceso"],[4,"#10b981","Dominada"]].map(([s,c,l])=>html`
              <span key=${s} style=${{display:"flex",alignItems:"center",gap:"3px"}}><span style=${{width:"7px",height:"7px",borderRadius:"50%",background:c,display:"inline-block"}}></span>${l}</span>
            `)}
          </div>
        </div>
        <div style=${{display:"flex",flexWrap:"wrap",gap:"5px"}}>
          ${memWords.map(w=>{
            const srE=getSREntry(sr,w.id);const sc=getStrengthColor(srE.strength);const c=CATS[w.type]||CATS.noun;
            return html`<div key=${w.id} title="${w.word} · ${w.translation} · Fuerza: ${srE.strength}/5"
              style=${{padding:"3px 8px",borderRadius:"20px",fontSize:"11px",fontWeight:600,background:`${sc}22`,border:`1px solid ${sc}55`,color:sc}}>
              ${c.icon} ${w.word}
            </div>`;
          })}
          ${vocab.length===0&&html`<div style=${{fontSize:"13px",color:"rgba(255,255,255,.3)",padding:"8px"}}>Agrega palabras para ver el mapa</div>`}
        </div>
      </div>

      <!-- SR guide -->
      <div class="card" style=${{padding:"18px",background:"linear-gradient(135deg,rgba(99,102,241,.1),rgba(139,92,246,.07))",border:"1px solid rgba(99,102,241,.2)"}}>
        <div class="syne" style=${{fontSize:"14px",color:"#a5b4fc",marginBottom:"11px"}}>⚡ Cómo funciona el repaso espaciado</div>
        <div style=${{display:"flex",flexDirection:"column",gap:"7px"}}>
          ${[["😤 Difícil","Reinicia el intervalo → revisa mañana","#f87171"],["👍 Bien","Mantiene el nivel → mismo intervalo","#a5b4fc"],["🎯 Fácil","Sube de nivel → próximo intervalo más largo","#6ee7b7"],["📅 Intervalos","Nivel 0: 1d · 1: 3d · 2: 7d · 3: 14d · 4: 30d · 5: 90d","#fcd34d"]].map(([t,d,c])=>html`
            <div key=${t} style=${{display:"flex",gap:"9px",alignItems:"flex-start"}}>
              <span style=${{fontSize:"12px",fontWeight:700,color:c,minWidth:"75px",flexShrink:0}}>${t}</span>
              <span style=${{fontSize:"12px",color:"rgba(255,255,255,.55)",lineHeight:1.5}}>${d}</span>
            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

// GRAMMAR FORMULAS
// ═══════════════════════════════════════════════════════════════
function GrammarFormulas({onClose}){
  const [activeGroup,setActiveGroup]=useState(0);
  const [activeItem,setActiveItem]=useState(null);
  const [search,setSearch]=useState("");
  const LVL_C={A1:"#34d399",A2:"#10b981",B1:"#60a5fa",B2:"#818cf8",C1:"#f59e0b",C2:"#ef4444"};

  const filtered=useMemo(()=>{
    if(!search.trim())return GF;
    const s=search.toLowerCase();
    return GF.map(g=>({...g,items:g.items.filter(i=>i.name.toLowerCase().includes(s)||i.formula.toLowerCase().includes(s)||i.use.toLowerCase().includes(s)||i.level.toLowerCase().includes(s))})).filter(g=>g.items.length>0);
  },[search]);

  return html`
    <div class="overlay" style=${{alignItems:"stretch",padding:"10px"}}>
      <div style=${{width:"100%",maxWidth:"860px",margin:"0 auto",borderRadius:"22px",background:"#080d18",border:"1px solid rgba(255,255,255,.1)",boxShadow:"0 32px 100px rgba(0,0,0,.8)",display:"flex",flexDirection:"column",maxHeight:"100%",overflow:"hidden"}}>

        <!-- Header -->
        <div style=${{padding:"15px 20px",borderBottom:"1px solid rgba(255,255,255,.07)",display:"flex",alignItems:"center",gap:"12px",flexShrink:0,background:"linear-gradient(135deg,rgba(245,158,11,.1),rgba(249,115,22,.07))"}}>
          <span style=${{fontSize:"24px"}}>📐</span>
          <div style=${{flex:1}}>
            <div class="syne" style=${{fontSize:"17px",color:"#fff"}}>Fórmulas Gramaticales</div>
            <div style=${{fontSize:"11px",color:"rgba(255,255,255,.4)",marginTop:"1px"}}>A1 → C2 · ${GF.reduce((a,g)=>a+g.items.length,0)} fórmulas · Toca 🔊 para escuchar</div>
          </div>
          <div style=${{position:"relative"}}>
            <span style=${{position:"absolute",left:"10px",top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,.25)",fontSize:"12px"}}>🔍</span>
            <input class="inp" value=${search} onInput=${e=>setSearch(e.target.value)} placeholder="Buscar…" style=${{padding:"7px 11px 7px 29px",width:"150px",fontSize:"12px"}}/>
          </div>
          <button onClick=${onClose} style=${{width:"30px",height:"30px",borderRadius:"50%",background:"rgba(255,255,255,.08)",border:"none",cursor:"pointer",color:"rgba(255,255,255,.6)",fontSize:"14px",flexShrink:0}}>✕</button>
        </div>

        <div style=${{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
          <!-- Sidebar -->
          <div style=${{width:"180px",flexShrink:0,borderRight:"1px solid rgba(255,255,255,.06)",overflowY:"auto",padding:"8px 6px"}}>
            ${(search?filtered:GF).map((g,i)=>html`
              <button key=${i} onClick=${()=>{setActiveGroup(i);setActiveItem(null);}}
                style=${{width:"100%",padding:"8px 11px",borderRadius:"11px",border:"none",cursor:"pointer",textAlign:"left",marginBottom:"2px",transition:"all .15s",
                  background:activeGroup===i&&!search?"rgba(255,255,255,.08)":"transparent",
                  color:activeGroup===i&&!search?"#fff":"rgba(255,255,255,.45)",fontSize:"12px",fontWeight:activeGroup===i&&!search?700:500,
                  display:"flex",alignItems:"center",gap:"6px"}}>
                <span style=${{fontSize:"13px"}}>${g.group.split(" ")[0]}</span>
                <span style=${{flex:1,lineHeight:1.3,fontSize:"11px"}}>${g.group.split(" ").slice(1).join(" ")}</span>
                <span style=${{fontSize:"9px",padding:"1px 5px",borderRadius:"9px",background:"rgba(255,255,255,.07)",color:"rgba(255,255,255,.35)"}}>${g.items.length}</span>
              </button>
            `)}
          </div>

          <!-- Formulas list -->
          <div style=${{flex:1,overflowY:"auto",padding:"13px"}}>
            ${(search?filtered:filtered.filter((_,i)=>i===activeGroup)).map((g,gi)=>html`
              <div key=${gi}>
                ${search&&html`<div class="syne" style=${{fontSize:"13px",color:g.color,marginBottom:"9px",marginTop:gi>0?"16px":0}}>${g.group}</div>`}
                <div style=${{display:"flex",flexDirection:"column",gap:"7px"}}>
                  ${g.items.map((item,ii)=>{
                    const isOpen=activeItem===`${gi}-${ii}`;
                    return html`
                      <div key=${ii} style=${{borderRadius:"14px",border:`1px solid ${isOpen?g.color+"66":"rgba(255,255,255,.07)"}`,overflow:"hidden",background:isOpen?`${g.color}10`:"rgba(255,255,255,.02)",transition:"border-color .2s"}}>
                        <div onClick=${()=>setActiveItem(isOpen?null:`${gi}-${ii}`)} style=${{padding:"11px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
                          <div style=${{flex:1}}>
                            <div style=${{display:"flex",alignItems:"center",gap:"7px",flexWrap:"wrap"}}>
                              <span class="syne" style=${{fontSize:"13px",color:"#fff"}}>${item.name}</span>
                              <span style=${{fontSize:"9px",fontWeight:700,padding:"2px 6px",borderRadius:"20px",background:`${LVL_C[item.level]}22`,color:LVL_C[item.level],border:`1px solid ${LVL_C[item.level]}44`}}>${item.level}</span>
                            </div>
                            <div style=${{fontSize:"11px",fontFamily:"monospace",color:g.color,marginTop:"3px",lineHeight:1.5}}>${item.formula}</div>
                          </div>
                          <div style=${{display:"flex",gap:"6px",flexShrink:0}}>
                            <button onClick=${e=>{e.stopPropagation();speak(item.ex);}} style=${{width:"26px",height:"26px",borderRadius:"7px",background:`${g.color}22`,border:`1px solid ${g.color}44`,cursor:"pointer",fontSize:"11px",color:g.color,display:"flex",alignItems:"center",justifyContent:"center"}}>🔊</button>

                        ${isOpen&&html`
                          <div class="fadeUp" style=${{padding:"0 14px 12px",borderTop:"1px solid rgba(255,255,255,.05)"}}>
                            <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"8px",marginTop:"9px"}}>
                              <div style=${{borderRadius:"11px",padding:"9px 11px",background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.2)"}}>
                                <div style=${{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1.5px",color:"rgba(52,211,153,.6)",marginBottom:"3px"}}>✅ Affirmative</div>
                                <div style=${{fontSize:"12px",fontStyle:"italic",color:"rgba(255,255,255,.8)",lineHeight:1.5}}>"${item.ex}"</div>
                                <button onClick=${()=>speak(item.ex)} style=${{marginTop:"4px",fontSize:"10px",color:"rgba(52,211,153,.5)",background:"none",border:"none",cursor:"pointer",padding:0}}>🔊 Escuchar</button>
                              </div>
                              ${item.neg&&item.neg!=="—"&&html`
                                <div style=${{borderRadius:"11px",padding:"9px 11px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)"}}>
                                  <div style=${{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1.5px",color:"rgba(248,113,113,.6)",marginBottom:"3px"}}>❌ Negative</div>
                                  <div style=${{fontSize:"12px",fontStyle:"italic",color:"rgba(255,255,255,.8)",lineHeight:1.5}}>"${item.neg}"</div>
                                  <button onClick=${()=>speak(item.neg)} style=${{marginTop:"4px",fontSize:"10px",color:"rgba(248,113,113,.5)",background:"none",border:"none",cursor:"pointer",padding:0}}>🔊 Escuchar</button>
                                </div>
                              `}
                              ${item.q&&item.q!=="—"&&html`
                                <div style=${{borderRadius:"11px",padding:"9px 11px",background:"rgba(99,102,241,.08)",border:"1px solid rgba(99,102,241,.2)"}}>
                                  <div style=${{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1.5px",color:"rgba(165,180,252,.6)",marginBottom:"3px"}}>❓ Question</div>
                                  <div style=${{fontSize:"12px",fontStyle:"italic",color:"rgba(255,255,255,.8)",lineHeight:1.5}}>"${item.q}"</div>
                                  <button onClick=${()=>speak(item.q)} style=${{marginTop:"4px",fontSize:"10px",color:"rgba(165,180,252,.5)",background:"none",border:"none",cursor:"pointer",padding:0}}>🔊 Escuchar</button>
                                </div>
                              `}
                              <div style=${{borderRadius:"11px",padding:"9px 11px",background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)"}}>
                                <div style=${{fontSize:"9px",textTransform:"uppercase",letterSpacing:"1.5px",color:"rgba(253,211,77,.6)",marginBottom:"3px"}}>💡 Cuándo usarlo</div>
                                <div style=${{fontSize:"12px",color:"rgba(255,255,255,.75)",lineHeight:1.5}}>${item.use}</div>
                              </div>
                            </div>
                            <div style=${{borderRadius:"10px",padding:"8px 11px",background:"rgba(0,0,0,.3)",border:`1px solid ${g.color}33`,fontFamily:"monospace",fontSize:"11px",color:g.color,lineHeight:1.6,marginTop:"8px"}}>
                              📐 ${item.formula}
                            </div>
                          </div>
                        `}
                      </div>
                    `;
                  })}
                </div>
              </div>
            `)}
          </div>
        </div>

        <!-- Footer -->
        <div style=${{padding:"9px 20px",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"rgba(0,0,0,.3)"}}>
          <div style=${{fontSize:"11px",color:"rgba(255,255,255,.3)"}}>${GF.reduce((a,g)=>a+g.items.length,0)} fórmulas · A1 a C2</div>
          <div style=${{display:"flex",gap:"5px"}}>
            ${["A1","A2","B1","B2","C1","C2"].map(l=>html`<span key=${l} style=${{fontSize:"9px",padding:"2px 6px",borderRadius:"20px",background:`${LVL_C[l]}18`,color:LVL_C[l],border:`1px solid ${LVL_C[l]}33`,fontWeight:700}}>${l}</span>`)}
          </div>
        </div>
      </div>
    </div>
  `;
}

// ─── RENDER ────────────────────────────────────────────────
render(html`<${App}/>`, document.getElementById("root"));
</script>
</body>
</html>
